steps:
  # Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/backend/factguard-backend:$COMMIT_SHA
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/backend/factguard-backend:latest
      - ./backend

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/backend/factguard-backend

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - factguard-backend
      - --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/backend/factguard-backend:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=SEA_LION_API_KEY=$$sealion-api-key,FACTGUARD_API_KEY=$$factguard-api-key,GEMINI_API_KEY=$$gemini-api-key,GROQ_API_KEY=$$groq-api-key-2

    secretEnv:
      - sealion-api-key
      - factguard-api-key
      - gemini-api-key
      - groq-api-key-2

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/sealion-api-key/versions/latest
      env: sealion-api-key
    - versionName: projects/$PROJECT_ID/secrets/factguard-api-key/versions/latest
      env: factguard-api-key
    - versionName: projects/$PROJECT_ID/secrets/gemini-api-key/versions/latest
      env: gemini-api-key
    - versionName: projects/$PROJECT_ID/secrets/groq-api-key-2/versions/latest
      env: groq-api-key-2

images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/backend/factguard-backend:$COMMIT_SHA
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/backend/factguard-backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
